<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#84cc16;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- House/Building -->
  <rect x="20" y="32" width="24" height="20" fill="url(#grad1)" rx="2"/>
  <!-- Roof -->
  <polygon points="32,12 20,32 44,32" fill="#059669"/>
  <!-- Door -->
  <rect x="28" y="40" width="8" height="12" fill="#eab308" rx="1"/>
  <!-- Dollar Sign -->
  <text x="32" y="50" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">$</text>
</svg>

